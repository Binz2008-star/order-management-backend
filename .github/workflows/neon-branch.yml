name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch_encode.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch_encode.outputs.db_url_with_pooler }}
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Get branch expiration date as an env variable (2 weeks from now)
        id: get_expiration_date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}
      - name: Debug Neon Outputs
        run: |
          echo "Neon branch URL: ${{ steps.create_neon_branch.outputs.db_url }}"
          echo "Neon pooler URL: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"
          echo "Branch name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}"
      - name: Encode Neon Branch Outputs
        id: create_neon_branch_encode
        run: |
          echo "db_url=$(echo '${{ steps.create_neon_branch.outputs.db_url }}' | base64 -w 0)" >> "$GITHUB_OUTPUT"
          echo "db_url_with_pooler=$(echo '${{ steps.create_neon_branch.outputs.db_url_with_pooler }}' | base64 -w 0)" >> "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Resolve effective DATABASE_URL
        run: |
          if [ -n "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}" ]; then
            echo "EFFECTIVE_DATABASE_URL=${{ steps.create_neon_branch.outputs.db_url_with_pooler }}" >> $GITHUB_ENV
            echo "Using Neon branch database URL"
          elif [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "EFFECTIVE_DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
            echo "Using fallback DATABASE_URL from secrets"
          else
            echo "ERROR: No DATABASE_URL available - Neon branch creation failed and secrets.DATABASE_URL not set"
            echo "This indicates a configuration issue that needs to be resolved"
            exit 1
          fi
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.EFFECTIVE_DATABASE_URL }}
      - name: Run Migrations
        run: npm run db:deploy
        env:
          DATABASE_URL: ${{ env.EFFECTIVE_DATABASE_URL }}
      - name: Run Seed
        run: npm run seed
        env:
          DATABASE_URL: ${{ env.EFFECTIVE_DATABASE_URL }}
      - name: Run Tests
        run: npm test
        env:
          DATABASE_URL: ${{ env.EFFECTIVE_DATABASE_URL }}
      - name: Post Schema Diff Comment to PR
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
