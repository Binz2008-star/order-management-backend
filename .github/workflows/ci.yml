name: CI

on:
  push:
    branches: [main, production-hardening]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-optional

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations on test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: file:./test.db

      - name: Run lint
        run: npx eslint . --format stylish --max-warnings=10

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Debug Prisma
        run: |
          echo "=== Prisma Status ==="
          npx prisma db pull
        env:
          DATABASE_URL: file:./test.db

      - name: Run tests
        run: |
          echo "=== ENV ==="
          env | sort

          echo "=== DB FILE ==="
          ls -la

          echo "=== Running Vitest ==="
          npx vitest run --reporter=verbose --run
        env:
          DATABASE_URL: file:./test.db
          NODE_ENV: test
