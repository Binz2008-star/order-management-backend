name: CI

on:
  push:
    branches: [main, production-hardening]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-optional

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations on test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: file:./test.db

      - name: Run lint
        run: npx eslint . --format stylish --max-warnings=10

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Debug Prisma and test DB
        run: |
          echo "=== Prisma version ==="
          npx prisma --version
          echo "=== Confirm database file ==="
          ls -la
          echo "=== SQLite file check ==="
          test -f ./test.db && echo "test.db exists" || echo "test.db missing"
        env:
          DATABASE_URL: file:./test.db

      - name: Debug test environment
        run: |
          echo "NODE_ENV=$NODE_ENV"
          echo "DATABASE_URL=$DATABASE_URL"
          echo "PWD=$(pwd)"
          echo "=== Files ==="
          ls -la
        env:
          DATABASE_URL: file:./test.db
          NODE_ENV: test

      - name: Run tests
        run: |
          echo "=== Running Vitest ==="
          npx vitest run --reporter=verbose
        env:
          DATABASE_URL: file:./test.db
          NODE_ENV: test
