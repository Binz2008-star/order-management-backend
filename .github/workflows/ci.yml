name: CI

on:
  push:
    branches: [main, production-hardening]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: order_management_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d order_management_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/order_management_test?schema=public

      - name: Run migrations on test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/order_management_test?schema=public

      - name: Run lint
        run: npx eslint . --format stylish --max-warnings=10

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Debug Prisma and test DB
        run: |
          echo "=== Prisma version ==="
          npx prisma --version
          echo "=== PostgreSQL readiness ==="
          pg_isready -h localhost -p 5432 -U postgres -d order_management_test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/order_management_test?schema=public
          PGPASSWORD: postgres

      - name: Debug test environment
        run: |
          echo "NODE_ENV=$NODE_ENV"
          echo "DATABASE_URL=$DATABASE_URL"
          echo "PWD=$(pwd)"
          echo "=== Files ==="
          ls -la
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/order_management_test?schema=public
          NODE_ENV: test

      - name: Run tests
        run: |
          echo "=== Running Vitest ==="
          npx vitest run --reporter=verbose
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/order_management_test?schema=public
          NODE_ENV: test
