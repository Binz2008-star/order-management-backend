# GitHub Branch Protection Setup
# This workflow sets up required branch protection rules

name: Setup Branch Protection

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to protect'
        required: true
        default: 'main'
        type: string

jobs:
  setup-branch-protection:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Branch Protection
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.payload.inputs.branch || 'main';
            
            // Required status checks that must pass
            const requiredStatusChecks = [
              'Gateway-Only HTTP Enforcement',
              'ESLint Enforcement', 
              'Contract Sync Enforcement',
              'End-to-End Flow Testing',
              'Redis Rate Limiting Verification'
            ];
            
            // Branch protection rules
            const protection = {
              required_status_checks: {
                strict: true, // Require up-to-date branches
                contexts: requiredStatusChecks
              },
              enforce_admins: true, // Enforce rules on admins
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false,
                require_up_to_date_reviews: true
              },
              restrictions: null, // No restrictions on who can push
              allow_force_pushes: false,
              allow_deletions: false,
              required_linear_history: true,
              allow_force_pushes_for_collaborators: false,
              required_conversation_resolution: true,
              lock_branch: false,
              allow_fork_syncing: false
            };
            
            try {
              // Update branch protection
              const result = await github.rest.repos.updateBranchProtection({
                owner,
                repo,
                branch,
                protection
              });
              
              console.log(`Branch protection updated for ${branch}`);
              console.log('Required status checks:', requiredStatusChecks);
              console.log('Result:', result.status);
              
            } catch (error) {
              console.error('Failed to update branch protection:', error.message);
              
              // Try to create protection if it doesn't exist
              if (error.message.includes('Not Found')) {
                console.log('Creating new branch protection...');
                const result = await github.rest.repos.createBranchProtection({
                  owner,
                  repo,
                  branch,
                  protection
                });
                console.log('Branch protection created:', result.status);
              } else {
                throw error;
              }
            }
            
            // Verify protection is active
            const currentProtection = await github.rest.repos.getBranchProtection({
              owner,
              repo,
              branch
            });
            
            console.log('Current branch protection:', JSON.stringify(currentProtection.data, null, 2));
            
            // Check if all required status checks are present
            const currentChecks = currentProtection.data.required_status_checks?.contexts || [];
            const missingChecks = requiredStatusChecks.filter(check => !currentChecks.includes(check));
            
            if (missingChecks.length > 0) {
              console.error('Missing required status checks:', missingChecks);
              throw new Error(`Missing status checks: ${missingChecks.join(', ')}`);
            }
            
            console.log('Branch protection setup complete and verified');
