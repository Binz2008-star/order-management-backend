# Render deployment configuration
services:
  # PostgreSQL database
  - type: pserv
    name: order-management-db
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile.postgres

  # Production API service
  - type: web
    name: order-management-backend
    runtime: node
    plan: starter
    buildCommand: npm run build && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: order-management-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: KARRIO_BASE_URL
        sync: false
      - key: KARRIO_API_KEY
        sync: false
